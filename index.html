<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi Language Notice</title>

<style>
body{
    font-family: sans-serif;
    text-align:center;
    padding:40px;
    background:#111;
    color:#fff;
}
.box{
    background:#222;
    padding:20px;
    border-radius:10px;
    display:inline-block;
    max-width:500px;
}
button{
    margin:5px;
    padding:10px 15px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
    <h2 id="title"></h2>
    <p id="text"></p>

    <div>
        <button onclick="setLang('ja')">日本語</button>
        <button onclick="setLang('en')">English</button>
        <button onclick="setLang('ko')">한국어</button>
        <button onclick="setLang('zh')">中文</button>
        <button onclick="setLang('es')">Español</button>
        <button onclick="setLang('fr')">Français</button>
    </div>
</div>

<script>
const data = {
    ja: {
        title: "お知らせ",
        text: "Robloxは2026年5月にApp Storeから削除されます。これにより、Robloxの管理予算が不十分になる可能性があります。\n\nRobloxで遊んでいただき、ありがとうございます。"
    },
    en: {
        title: "Notice",
        text: "Roblox will be removed from the App Store in May 2026. This may result in insufficient management budget for Roblox.\n\nThank you for playing Roblox."
    },
    ko: {
        title: "공지",
        text: "Roblox는 2026년 5월 App Store에서 삭제됩니다. 이로 인해 Roblox의 운영 예산이 부족해질 수 있습니다.\n\nRoblox를 이용해 주셔서 감사합니다."
    },
    zh: {
        title: "通知",
        text: "Roblox 将于 2026 年 5 月从 App Store 下架。这可能导致 Roblox 的管理预算不足。\n\n感谢您游玩 Roblox。"
    },
    es: {
        title: "Aviso",
        text: "Roblox será eliminado de la App Store en mayo de 2026. Esto puede causar falta de presupuesto de gestión.\n\nGracias por jugar Roblox."
    },
    fr: {
        title: "Avis",
        text: "Roblox sera supprimé de l'App Store en mai 2026. Cela peut entraîner un manque de budget de gestion.\n\nMerci d'avoir joué à Roblox."
    }
};

function setLang(lang){
    document.getElementById("title").innerText = data[lang].title;
    document.getElementById("text").innerText = data[lang].text;
}

// 初期表示
setLang('ja');
</script>

</body>
</html>
