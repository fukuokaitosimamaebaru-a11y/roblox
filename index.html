<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>roblox Notice</title>

<style>
body{
    margin:0;
    font-family: 'Arial Black', Arial, sans-serif;
    background:#0f1115;
    color:white;
}

/* 上バー */
.header{
    background:#191b1f;
    padding:14px 20px;
    display:flex;
    align-items:center;
    gap:10px;
    font-size:20px;
    font-weight:bold;
}

/* 改良ロゴ（SVGで綺麗） */
.logo{
    width:26px;
    height:26px;
}

/* 中央 */
.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:85vh;
}

/* カード */
.card{
    background:#1c1f24;
    padding:30px;
    border-radius:14px;
    width:420px;
    box-shadow:0 10px 40px rgba(0,0,0,0.6);
    text-align:center;
}

/* タイトル */
h1{
    margin:0 0 10px;
    font-size:22px;
}

/* 本文 */
p{
    color:#cfcfcf;
    line-height:1.6;
    white-space:pre-line;
}

/* ボタン */
.lang{
    margin-top:20px;
}

button{
    margin:5px;
    padding:8px 12px;
    border:none;
    border-radius:6px;
    background:#2a2d33;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#3a3f46;
}
</style>
</head>

<body>

<div class="header">
    <!-- ちゃんとしたロゴ風（SVG） -->
    <svg class="logo" viewBox="0 0 100 100">
        <rect x="20" y="20" width="60" height="60" fill="white" transform="rotate(15 50 50)"/>
        <rect x="40" y="40" width="20" height="20" fill="#191b1f" transform="rotate(15 50 50)"/>
    </svg>
    roblox
</div>

<div class="container">
    <div class="card">
        <h1 id="title"></h1>
        <p id="text"></p>

        <div class="lang">
            <button onclick="setLang('ja')">日本語</button>
            <button onclick="setLang('en')">EN</button>
            <button onclick="setLang('ko')">KR</button>
            <button onclick="setLang('zh')">CN</button>
        </div>
    </div>
</div>

<script>
const data = {
    ja: {
        title: "お知らせ",
        text: "robloxは2026年5月にアプリストアから削除される可能性があります。\n\n遊んでいただきありがとうございます。"
    },
    en: {
        title: "Notice",
        text: "robloxmay be removed from the App Store in May 2026.\n\nThank you for playing."
    },
    ko: {
        title: "공지",
        text: "roblox는 2026년 5월 앱스토어에서 삭제될 수 있습니다。\n\n이용해 주셔서 감사합니다。"
    },
    zh: {
        title: "通知",
        text: "roblox 可能会在 2026 年 5 月从应用商店下架。\n\n感谢您的游玩。"
    }
};

function setLang(lang){
    document.getElementById("title").innerText = data[lang].title;
    document.getElementById("text").innerText = data[lang].text;
}

// 自動言語判定
let lang = navigator.language.startsWith("ja") ? "ja" :
           navigator.language.startsWith("ko") ? "ko" : "en";

setLang(lang);
</script>

</body>
</html>
