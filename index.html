<!DO<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rblx Notice</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#121212;
    color:#fff;
}

/* 上バー */
.header{
    background:#1c1c1c;
    padding:15px;
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:bold;
    font-size:20px;
}

/* ロゴ風 */
.logo{
    width:24px;
    height:24px;
    background:#fff;
    transform: rotate(15deg);
}

/* カード */
.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:80vh;
}

.card{
    background:#1e1e1e;
    padding:25px;
    border-radius:12px;
    max-width:500px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h2{
    margin-top:0;
}

button{
    margin:5px;
    padding:10px 14px;
    border:none;
    border-radius:6px;
    background:#333;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#555;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo"></div>
    Rblx
</div>

<div class="container">
    <div class="card">
        <h2 id="title"></h2>
        <p id="text"></p>

        <div>
            <button onclick="setLang('ja')">日本語</button>
            <button onclick="setLang('en')">EN</button>
            <button onclick="setLang('ko')">KR</button>
            <button onclick="setLang('zh')">CN</button>
        </div>
    </div>
</div>

<script>
const data = {
    ja: {
        title: "お知らせ",
        text: "Rblxは2026年5月にアプリストアから削除される可能性があります。\n\n遊んでいただきありがとうございます。"
    },
    en: {
        title: "Notice",
        text: "Rblx may be removed from the App Store in May 2026.\n\nThank you for playing."
    },
    ko: {
        title: "공지",
        text: "Rblx는 2026년 5월 앱스토어에서 삭제될 수 있습니다.\n\n이용해 주셔서 감사합니다."
    },
    zh: {
        title: "通知",
        text: "Rblx 可能会在 2026 年 5 月从应用商店下架。\n\n感谢您的游玩。"
    }
};

function setLang(lang){
    document.getElementById("title").innerText = data[lang].title;
    document.getElementById("text").innerText = data[lang].text;
}

setLang('ja');
</script>

</body>
</html>
